image boot.vfat {
    vfat {
        files = {
            "boot.bin",
            "system.dtb",
            "uImage",
            "uEnv.txt"
        }
    }
    size = 64M
}

image rootfs.ext4 {
    ext4 {
        use-mke2fs = true
    }
    mountpoint = "/"
    size = 512M
}

image sdcard.img {
    hdimage {
        partition-table-type = "mbr"
    }

    partition boot {
        partition-type = 0x0B
        bootable = true
        image = "boot.vfat"
    }

    partition rootfs {
        partition-type = 0x83
        image = "rootfs.ext4"
    }
}
